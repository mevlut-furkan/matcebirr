<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
#g{font-family:'Nunito',sans-serif;padding:0 0 24px;}
.bg-wrap{position:relative;border-radius:20px;overflow:hidden;background:linear-gradient(135deg,#1a1040 0%,#2d1b69 50%,#1a3a6b 100%);padding:20px;margin-bottom:18px;}
.bg-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.08) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.stars-deco{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.star-d{position:absolute;border-radius:50%;background:white;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{0%{opacity:0.2;}100%{opacity:1;transform:scale(1.4);}}
.game-title{text-align:center;color:white;font-size:26px;font-weight:900;text-shadow:0 2px 12px rgba(0,0,0,0.4);margin-bottom:4px;}
.game-sub{text-align:center;color:rgba(255,255,255,0.6);font-size:12px;letter-spacing:1px;margin-bottom:16px;}
.hud{display:flex;gap:10px;}
.hud-card{flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:10px 14px;text-align:center;}
.hud-val{font-size:20px;font-weight:900;color:white;}
.hud-lbl{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px;}
.prog-wrap{margin-bottom:18px;}
.prog-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:rgba(160,130,255,0.9);margin-bottom:6px;}
.prog-track{height:10px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);}
.prog-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#a78bfa,#60a5fa);transition:width 0.6s;}
.prob-card{background:white;border-radius:18px;padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.13);}
.prob-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);}
.prob-topic{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#ede9fe,#dbeafe);color:#4338ca;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:0.5px;}
.prob-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#7c3aed;color:white;border-radius:50%;font-size:11px;font-weight:900;}
.prob-text{font-size:14px;font-weight:600;color:#1e1b4b;line-height:1.7;}
.chips{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.chip{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;background:#f0fdf4;color:#166534;border:1.5px solid #86efac;}
.chip.blue{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd;}
.tab-row{display:flex;gap:6px;margin-bottom:14px;}
.tab{flex:1;text-align:center;padding:9px 8px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all 0.2s;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);}
.tab.active{background:white;color:#4c1d95;border-color:white;}
.tab:hover:not(.active){background:rgba(255,255,255,0.12);color:white;}
.instr{background:rgba(167,139,250,0.15);border:1.5px dashed rgba(167,139,250,0.5);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;color:rgba(220,200,255,0.9);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.trap-banner{background:rgba(251,146,60,0.18);border:1.5px dashed rgba(251,146,60,0.6);border-radius:12px;padding:9px 14px;font-size:12px;font-weight:700;color:rgba(255,200,120,0.95);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.steps-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.step-btn{width:100%;text-align:left;padding:13px 16px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:14px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);line-height:1.5;transition:all 0.2s;display:flex;align-items:center;gap:12px;font-family:'Nunito',sans-serif;}
.step-btn:hover{background:rgba(255,255,255,0.13);border-color:rgba(167,139,250,0.5);transform:translateY(-1px);}
.step-btn.is-terminal{border-color:rgba(250,204,21,0.35);background:rgba(250,204,21,0.08);}
.step-btn.is-terminal:hover{border-color:rgba(250,204,21,0.7);background:rgba(250,204,21,0.14);}
.step-btn.is-terminal .snum{background:rgba(250,204,21,0.25);border-color:rgba(250,204,21,0.6);color:#fef08a;}
.step-btn.is-terminal.correct{background:linear-gradient(135deg,rgba(250,204,21,0.22),rgba(52,211,153,0.15));border-color:#fcd34d;color:#fef9c3;}
.step-btn.is-terminal.correct .snum{background:#ca8a04;border-color:#fcd34d;color:white;}
.step-btn.correct{background:linear-gradient(135deg,rgba(52,211,153,0.2),rgba(16,185,129,0.15));border-color:#34d399;color:#d1fae5;pointer-events:none;}
.step-btn.correct .snum{background:#059669;border-color:#34d399;color:white;}
.step-btn.trap-wrong{border-color:#f87171;background:rgba(248,113,113,0.18);animation:shake 0.4s;pointer-events:none;}
.step-btn.trap-used{opacity:0.32;pointer-events:none;border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.06);}
.step-btn.trap-used .trap-badge{display:inline-block;font-size:10px;font-weight:800;background:rgba(248,113,113,0.25);color:#fca5a5;border-radius:8px;padding:2px 7px;margin-left:6px;}
.trap-badge{display:none;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}
.snum{min-width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:rgba(255,255,255,0.6);flex-shrink:0;}
.step-btn.correct .snum{background:#059669;border-color:#34d399;color:white;}
.step-btn.trap-wrong .snum,.step-btn.trap-used .snum{background:rgba(248,113,113,0.3);border-color:#f87171;color:#fca5a5;}
.fb{padding:12px 16px;border-radius:14px;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;animation:popIn 0.25s;}
@keyframes popIn{from{opacity:0;transform:scale(0.95);}to{opacity:1;transform:scale(1);}}
.fb.ok{background:rgba(52,211,153,0.18);border:2px solid #34d399;color:#d1fae5;}
.fb.err{background:rgba(248,113,113,0.15);border:2px solid #f87171;color:#fee2e2;}
.fb.trap{background:rgba(251,146,60,0.18);border:2px solid #fb923c;color:#ffedd5;}
.next-btn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;border:none;background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;letter-spacing:0.5px;box-shadow:0 4px 16px rgba(124,58,237,0.4);transition:all 0.2s;font-family:'Nunito',sans-serif;}
.next-btn:hover{transform:translateY(-2px);}

/* ===== MATCHING GAME ===== */
.match-prog-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.match-prog-track{flex:1;height:7px;background:rgba(255,255,255,0.1);border-radius:6px;overflow:hidden;}
.match-prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#34d399,#60a5fa);transition:width 0.4s;}
.match-prog-lbl{font-size:12px;font-weight:800;color:rgba(255,255,255,0.7);white-space:nowrap;}
.match-area{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;}
.match-flow{flex:0 0 47%;display:flex;flex-direction:column;align-items:stretch;}
.match-labels-col{flex:1;display:flex;flex-direction:column;gap:6px;}
.match-col-title{font-size:10px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:0.8px;margin-bottom:4px;text-align:center;}

/* OVAL node */
.mn-oval{border-radius:40px;border:2px solid rgba(250,204,21,0.5);background:rgba(250,204,21,0.1);color:#fef08a;padding:7px 10px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:11px;font-weight:700;line-height:1.3;}
.mn-oval:hover{border-color:rgba(250,204,21,0.9);background:rgba(250,204,21,0.2);}
/* RECTANGLE node */
.mn-rect{border-radius:6px;border:2px solid rgba(96,165,250,0.5);background:rgba(96,165,250,0.1);color:#bfdbfe;padding:7px 10px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:11px;font-weight:700;line-height:1.3;}
.mn-rect:hover{border-color:rgba(96,165,250,0.9);background:rgba(96,165,250,0.2);}
/* PARALLELOGRAM node — wrapper+inner trick */
.mn-para-wrap{cursor:pointer;transition:all 0.2s;}
.mn-para-outer{transform:skewX(-13deg);border:2px solid rgba(167,139,250,0.5);background:rgba(167,139,250,0.1);border-radius:4px;padding:7px 20px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;min-height:40px;}
.mn-para-wrap:hover .mn-para-outer{border-color:rgba(167,139,250,0.9);background:rgba(167,139,250,0.2);}
.mn-para-text{transform:skewX(13deg);font-size:11px;font-weight:700;color:#ddd6fe;text-align:center;line-height:1.3;}

/* States */
.mn-matched-oval{border-color:#34d399!important;background:rgba(52,211,153,0.22)!important;color:#d1fae5!important;pointer-events:none!important;}
.mn-matched-rect{border-color:#34d399!important;background:rgba(52,211,153,0.22)!important;color:#d1fae5!important;pointer-events:none!important;}
.mn-para-outer.mn-matched-para{border-color:#34d399!important;background:rgba(52,211,153,0.22)!important;pointer-events:none!important;}
.mn-para-outer.mn-matched-para .mn-para-text{color:#d1fae5!important;}
.mn-para-wrap.mn-matched-para-wrap{pointer-events:none;}

/* Target state (label selected) */
.mn-target-oval{border-color:rgba(255,255,255,0.8)!important;border-style:dashed!important;animation:pulseBorder 0.7s infinite alternate;}
.mn-target-rect{border-color:rgba(255,255,255,0.8)!important;border-style:dashed!important;animation:pulseBorder 0.7s infinite alternate;}
.mn-para-wrap.mn-target-para .mn-para-outer{border-color:rgba(255,255,255,0.8)!important;border-style:dashed!important;animation:pulseBorder 0.7s infinite alternate;}
@keyframes pulseBorder{from{border-color:rgba(255,255,255,0.3)!important;}to{border-color:rgba(255,255,255,1)!important;}}

/* Wrong shake */
.mn-shake{animation:shake 0.45s!important;}

/* Arrow between nodes */
.marrow{text-align:center;font-size:13px;color:rgba(255,255,255,0.3);line-height:1.2;padding:1px 0;}

/* Label cards */
.mlabel{width:100%;padding:9px 12px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.14);border-radius:10px;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,0.85);text-align:left;transition:all 0.2s;font-family:'Nunito',sans-serif;line-height:1.4;}
.mlabel:hover{background:rgba(255,255,255,0.13);border-color:rgba(167,139,250,0.6);}
.mlabel.msel{border-color:#a78bfa;background:rgba(167,139,250,0.25);color:#ede9fe;box-shadow:0 0 0 3px rgba(167,139,250,0.2);}
.mlabel.mdone{border-color:rgba(52,211,153,0.35);background:rgba(52,211,153,0.06);color:rgba(209,250,229,0.45);pointer-events:none;text-decoration:line-through;}

/* Legend */
.legend{display:flex;gap:6px;margin-top:12px;}
.leg-item{flex:1;background:rgba(255,255,255,0.05);border-radius:10px;padding:8px 4px;text-align:center;}
.leg-oval{border-radius:30px;border:1.5px solid rgba(250,204,21,0.5);color:#fef08a;font-size:9px;font-weight:800;padding:3px 8px;display:inline-block;background:rgba(250,204,21,0.08);margin-bottom:4px;}
.leg-rect{border-radius:3px;border:1.5px solid rgba(96,165,250,0.5);color:#bfdbfe;font-size:9px;font-weight:800;padding:3px 8px;display:inline-block;background:rgba(96,165,250,0.08);margin-bottom:4px;}
.leg-para-wrap{display:inline-block;margin-bottom:4px;}
.leg-para{transform:skewX(-12deg);border:1.5px solid rgba(167,139,250,0.5);color:#ddd6fe;font-size:9px;font-weight:800;padding:3px 12px;display:inline-block;background:rgba(167,139,250,0.08);}
.leg-para span{transform:skewX(12deg);display:inline-block;}
.leg-title{font-size:9px;font-weight:800;color:rgba(255,255,255,0.6);display:block;}
.leg-desc{font-size:8px;color:rgba(255,255,255,0.35);}

/* type label inside shape */
.shape-type-tiny{font-size:8px;font-weight:800;opacity:0.7;display:block;margin-bottom:1px;}
.shape-main-label{font-size:11px;font-weight:700;display:block;}

/* Win screen */
.win-wrap{text-align:center;padding:10px 0;}
.trophy{font-size:64px;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0) rotate(-5deg);}to{transform:translateY(-10px) rotate(5deg);}}
.win-title{font-size:24px;font-weight:900;color:white;margin:14px 0 6px;}
.win-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:22px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.stat-c{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:16px;padding:14px 8px;}
.stat-v{font-size:26px;font-weight:900;color:white;}
.stat-l{font-size:11px;color:rgba(255,255,255,0.55);margin-top:3px;}
.summary-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:16px 18px;margin-bottom:20px;text-align:left;}
.sum-title{font-size:12px;font-weight:800;color:rgba(167,139,250,0.9);letter-spacing:1px;margin-bottom:12px;}
.sum-step{background:rgba(255,255,255,0.07);border-left:3px solid #a78bfa;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:6px;}
</style>

let shuffled=[];
function getSh(i){
  if(!shuffled[i]){
    const mid=[...probs[i].steps.slice(1,6),...probs[i].traps];
    for(let j=mid.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[mid[j],mid[k]]=[mid[k],mid[j]];}
    shuffled[i]=[probs[i].steps[0],...mid,probs[i].steps[6]];
  }
  return shuffled[i];
}

let matchStates={};
function getMS(pi){
  if(!matchStates[pi]){
    const labels=probs[pi].algoNodes.map(n=>n.label);
    const sh=[...labels];
    for(let i=sh.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sh[i],sh[j]]=[sh[j],sh[i]];}
    matchStates[pi]={sel:null,matched:{},wrongNode:null,shuffled:sh};
  }
  return matchStates[pi];
}

function clickMatchLabel(pi,li){
  const m=getMS(pi);
  const label=m.shuffled[li];
  if(Object.values(m.matched).includes(label))return;
  m.sel=(m.sel===label)?null:label;
  render();
}
function clickMatchNode(pi,ni){
  const m=getMS(pi);
  if(!m.sel||m.matched[ni]!==undefined)return;
  if(probs[pi].algoNodes[ni].label===m.sel){
    m.matched[ni]=m.sel;m.sel=null;
  } else {
    m.wrongNode=ni;render();
    setTimeout(()=>{m.wrongNode=null;render();},550);return;
  }
  render();
}

let s={pi:0,clicked:[],trapHit:[],animTrap:null,done:false,stars:0,wrong:0,totalWrong:0,fb:null,view:'steps',screen:'game'};

function isTrap(id){return id.startsWith('t');}
function clickStep(id){
  if(s.done||s.trapHit.includes(id))return;
  if(!isTrap(id)){
    const prob=probs[s.pi];const exp=prob.order[s.clicked.length];
    if(id===exp){
      s.clicked.push(id);s.fb=null;
      if(s.clicked.length===prob.order.length){
        s.done=true;const earn=Math.max(3-s.wrong,1);s.stars+=earn;
        s.fb={type:'ok',icon:'🎉',text:`Mükemmel! Başla'dan Bitir'e tamamlandı! Cevap: ${prob.answer} — ${earn} yıldız!`};
      }
    } else {
      s.wrong++;s.totalWrong++;
      s.fb={type:'err',icon:'🤔',text:'Bu adım doğru ama sırası değil! Önce hangisi gelmeli?'};
      render();setTimeout(()=>{s.fb=null;render();},1800);return;
    }
  } else {
    s.wrong++;s.totalWrong++;s.animTrap=id;s.trapHit.push(id);
    s.fb={type:'trap',icon:'🪤',text:'Bu bir TUZAK adım! Hatalı bilgi içeriyor — elendi!'};
    render();setTimeout(()=>{s.animTrap=null;render();},500);setTimeout(()=>{s.fb=null;render();},2200);return;
  }
  render();
}
function next(){
  if(s.pi<probs.length-1){s.pi++;s.clicked=[];s.trapHit=[];s.animTrap=null;s.done=false;s.wrong=0;s.fb=null;s.view='steps';render();}
  else{s.screen='win';render();}
}
function restart(){
  shuffled=[];matchStates={};
  s={pi:0,clicked:[],trapHit:[],animTrap:null,done:false,stars:0,wrong:0,totalWrong:0,fb:null,view:'steps',screen:'game'};
  render();
}

function starDeco(){
  let h='';
  [[8,12],[18,45],[6,72],[92,8],[88,35],[95,65],[15,88],[82,82],[50,5],[45,92],[30,20],[70,60]].forEach(([l,t],i)=>{
    const d=(i*0.17).toFixed(2),sz=i%3===0?5:i%3===1?3:4;
    h+=`<div class="star-d" style="left:${l}%;top:${t}%;animation-delay:${d}s;width:${sz}px;height:${sz}px;"></div>`;
  });return h;
}

function renderMatchGame(prob,pi){
  const m=getMS(pi);
  const nodes=prob.algoNodes;
  const total=nodes.length;
  const matchedCount=Object.keys(m.matched).length;
  const allDone=matchedCount===total;
  const pct=Math.round((matchedCount/total)*100);

  let h=`<div class="match-prog-row">
    <div class="match-prog-track"><div class="match-prog-fill" style="width:${pct}%"></div></div>
    <div class="match-prog-lbl">${matchedCount}/${total} eşleşti</div>
  </div>`;

  h+=`<div class="match-area">`;

  // LEFT: flowchart shapes
  h+=`<div class="match-flow"><div class="match-col-title">AKI&#350; &#350;EMALARI</div>`;
  nodes.forEach((node,i)=>{
    const isDone=m.matched[i]!==undefined;
    const isWrong=m.wrongNode===i;
    const isTarget=!!m.sel&&!isDone;
    const displayLabel=isDone?m.matched[i]:'?';
    const innerContent=`<span class="shape-type-tiny">${node.tn}</span><span class="shape-main-label">${displayLabel}</span>`;

    if(node.shape==='oval'){
      const cls=`mn-oval${isDone?' mn-matched-oval':''}${isTarget?' mn-target-oval':''}${isWrong?' mn-shake':''}`;
      h+=`<div class="${cls}" onclick="clickMatchNode(${pi},${i})">${innerContent}</div>`;
    } else if(node.shape==='rect'){
      const cls=`mn-rect${isDone?' mn-matched-rect':''}${isTarget?' mn-target-rect':''}${isWrong?' mn-shake':''}`;
      h+=`<div class="${cls}" onclick="clickMatchNode(${pi},${i})">${innerContent}</div>`;
    } else {
      const wrapCls=`mn-para-wrap${isDone?' mn-matched-para-wrap':''}${isTarget?' mn-target-para':''}${isWrong?' mn-shake':''}`;
      const outerCls=`mn-para-outer${isDone?' mn-matched-para':''}`;
      h+=`<div class="${wrapCls}" onclick="clickMatchNode(${pi},${i})">
        <div class="${outerCls}">
          <div class="mn-para-text">${innerContent}</div>
        </div>
      </div>`;
    }
    if(i<nodes.length-1)h+=`<div class="marrow">↓</div>`;
  });
  h+=`</div>`;

  // RIGHT: shuffled label cards
  h+=`<div class="match-labels-col"><div class="match-col-title">ETİKETLER</div>`;
  const matchedVals=Object.values(m.matched);
  m.shuffled.forEach((label,li)=>{
    const isMatched=matchedVals.includes(label);
    const isSel=m.sel===label;
    let cls='mlabel';
    if(isMatched)cls+=' mdone';
    else if(isSel)cls+=' msel';
    h+=`<button class="${cls}" onclick="clickMatchLabel(${pi},${li})">${label}</button>`;
  });
  h+=`</div>`;
  h+=`</div>`; // end match-area

  // Legend
  h+=`<div class="legend">
    <div class="leg-item">
      <div class="leg-oval">Oval</div>
      <span class="leg-title">Oval</span>
      <span class="leg-desc">Başlangıç / Bitiş</span>
    </div>
    <div class="leg-item">
      <div class="leg-rect">Dikdörtgen</div>
      <span class="leg-title">Dikdörtgen</span>
      <span class="leg-desc">İşlem adımı</span>
    </div>
    <div class="leg-item">
      <div class="leg-para-wrap"><div class="leg-para"><span>Paralelkenar</span></div></div>
      <span class="leg-title">Paralelkenar</span>
      <span class="leg-desc">Giriş / Çıkış</span>
    </div>
  </div>`;

  if(allDone){
    h+=`<div class="fb ok" style="margin-top:12px;"><span style="font-size:18px;">🎯</span>Tüm şekiller doğru eşleştirildi! Akış şeması ustasısın!</div>`;
  } else if(m.sel){
    h+=`<div style="font-size:12px;font-weight:700;color:rgba(220,200,255,0.9);text-align:center;margin-top:10px;padding:8px;background:rgba(167,139,250,0.12);border-radius:10px;">
      "<b style="color:white;">${m.sel}</b>" seçili — şimdi soldaki doğru şekle tıkla!
    </div>`;
  } else {
    h+=`<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.35);text-align:center;margin-top:10px;">Sağdan bir etiket seç, soldaki eşleşen şekle tıkla.</div>`;
  }
  return h;
}

function render(){
  const el=document.getElementById('g');
  if(s.screen==='win'){el.innerHTML=renderWin();return;}
  const prob=probs[s.pi];
  const allSteps=getSh(s.pi);
  const pct=Math.round(((s.pi+(s.done?1:s.clicked.length/prob.order.length))/probs.length)*100);

  let html=`<div class="bg-wrap">
    <div class="stars-deco">${starDeco()}</div>
    <div class="game-title">Algoritma</div>
    <div class="game-sub">DOĞRUSAL FONKSİYON ALGORİTMASI</div>
    <div class="hud">
      <div class="hud-card"><div class="hud-val">⭐ ${s.stars}</div><div class="hud-lbl">Yıldız</div></div>
      <div class="hud-card"><div class="hud-val">${s.pi+1} / ${probs.length}</div><div class="hud-lbl">Problem</div></div>
      <div class="hud-card"><div class="hud-val">${s.clicked.length} / ${prob.order.length}</div><div class="hud-lbl">Adım</div></div>
    </div>
    <div style="margin-top:14px;" class="prog-wrap">
      <div class="prog-label"><span>İlerleme</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  html+=`<div class="prob-card">
    <div class="prob-topic"><span class="prob-num">${prob.id}</span>${prob.icon} ${prob.topic}</div>
    <div class="prob-text">${prob.text}</div>
    <div class="chips">${prob.chips.map(c=>`<span class="${c.cls}">${c.t}</span>`).join('')}</div>
  </div>`;

  html+=`<div class="bg-wrap" style="padding:14px;">
    <div class="stars-deco" style="opacity:0.3;">${starDeco()}</div>
    <div class="tab-row">
      <div class="tab${s.view==='steps'?' active':''}" onclick="s.view='steps';render()">📋 Adımları Sırala</div>
      <div class="tab${s.view==='algo'?' active':''}" onclick="s.view='algo';render()">🔷 Şekil Eşleştirme</div>
    </div>`;

  if(s.view==='steps'){
    html+=`<div class="instr"><span>👆</span><b>Başla</b>'dan <b>Bitir</b>'e doğru sırayla tıkla — tuzaklara dikkat!</div>`;
    html+=`<div class="trap-banner"><span>🪤</span><span>${prob.traps.length} tuzak adım gizlenmiş!</span></div>`;
    html+=`<div class="steps-grid">`;
    allSteps.forEach(step=>{
      const trap=isTrap(step.id);
      const isClicked=s.clicked.includes(step.id);
      const isTrapHit=s.trapHit.includes(step.id);
      const isAnim=s.animTrap===step.id;
      const pos=s.clicked.indexOf(step.id);
      const isTerminal=step.terminal||false;
      let cls='step-btn';
      if(isTerminal&&!trap)cls+=' is-terminal';
      if(isClicked)cls+=' correct';
      else if(isAnim)cls+=' trap-wrong';
      else if(isTrapHit)cls+=' trap-used';
      const numLabel=isClicked?(pos+1):(isTrapHit?'✕':'?');
      const icon=isTerminal?(step.id==='s0'?'▶':'⏹'):'';
      html+=`<button class="${cls}" onclick="clickStep('${step.id}')">
        <span class="snum">${numLabel}</span>
        ${icon?`<span style="font-size:13px;opacity:0.8;">${icon}</span>`:''}
        <span>${step.text}${isTrapHit?'<span class="trap-badge">TUZAK</span>':''}</span>
      </button>`;
    });
    html+=`</div>`;
  } else {
    html+=renderMatchGame(prob,s.pi);
  }

  if(s.view==='steps'){
    if(s.fb)html+=`<div class="fb ${s.fb.type}"><span style="font-size:18px;">${s.fb.icon}</span>${s.fb.text}</div>`;
    if(s.done)html+=`<button class="next-btn" onclick="next()">${s.pi<probs.length-1?'Sonraki Problem →':'Sonuçları Gör →'}</button>`;
  }
  html+=`</div>`;
  el.innerHTML=html;
}

function renderWin(){
  return`<div class="bg-wrap">
    <div class="stars-deco">${starDeco()}</div>
    <div class="win-wrap">
      <div class="trophy">🏆</div>
      <div class="win-title">Tebrikler, Algoritma Dedektifi!</div>
      <div class="win-sub">Hem adımları sıraladın, hem şekilleri eşleştirdin!</div>
      <div class="stats-row">
        <div class="stat-c"><div class="stat-v">⭐ ${s.stars}</div><div class="stat-l">Yıldız</div></div>
        <div class="stat-c"><div class="stat-v">${s.totalWrong}</div><div class="stat-l">Hata</div></div>
        <div class="stat-c"><div class="stat-v">${s.totalWrong===0?'😎':'👍'}</div><div class="stat-l">${s.totalWrong===0?'Mükemmel!':'İyi iş!'}</div></div>
      </div>
      <div class="summary-box">
        <div class="sum-title">ÖĞRENDIĞIN TAM ALGORİTMA</div>
        ${["▶ Başla — Oval şekil",
           "1️⃣ Değişkenleri belirle — Dikdörtgen",
           "2️⃣ Fonksiyonu kur f(x) = ax+b — Dikdörtgen",
           "3️⃣ Değeri gir — Paralelkenar",
           "4️⃣ Hesapla — Dikdörtgen",
           "5️⃣ Sonucu yaz — Paralelkenar",
           "⏹ Bitir — Oval şekil"].map(t=>`<div class="sum-step">${t}</div>`).join('')}
      </div>
      <button class="next-btn" onclick="restart()">🔄 Tekrar Oyna</button>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
